<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="sstyle.css">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Login</title>
</head>
<body>
    <header>
        <h1>Página de Autenticação</h1>
    </header>
    <main>
        <form action="auth.php" method="POST">
            <label for="inUser">Usuário: </label>
            <input type="text" id="inUser" name="inUser" placeholder="Digite seu usuário">
            <br>
            <label for="inPass">Senha: </label>
            <input type="password" id="inPass" name="inPass" placeholder="Digite sua senha">
            <br>
            <button type="submit">Fazer login</button>
        </form>
    </main>
    <footer></footer>
</body>
</html>
