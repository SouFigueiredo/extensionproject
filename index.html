<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      background: #0f0f13;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }
 
    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(83,74,183,0.18) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
    }
 
    .bg-glow2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,158,117,0.12) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      pointer-events: none;
    }
 
    .card {
      position: relative;
      background: #18181f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #534AB7, #1D9E75);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
 
    .logo-icon svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }
 
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: #f0effe;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
 
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.38);
      margin-bottom: 36px;
    }
 
    .field {
      margin-bottom: 20px;
    }
 
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
 
    .input-wrap {
      position: relative;
    }
 
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      display: flex;
    }
 
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      font-size: 15px;
      color: #f0effe;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
 
    input::placeholder { color: rgba(255,255,255,0.2); }
 
    input:focus {
      border-color: rgba(83,74,183,0.7);
      background: rgba(83,74,183,0.07);
    }
 
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.25);
      padding: 0;
      display: flex;
      transition: color 0.2s;
    }
 
    .toggle-pass:hover { color: rgba(255,255,255,0.55); }
 
    .forgot {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 28px;
    }
 
    .forgot a {
      font-size: 12px;
      color: rgba(83,74,183,0.85);
      text-decoration: none;
      transition: color 0.2s;
    }
 
    .forgot a:hover { color: #8f88e0; }
 
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #534AB7 0%, #3a3899 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.15s;
    }
 
    button[type="submit"]:hover  { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }
 
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: rgba(255,255,255,0.18);
      font-size: 12px;
    }
 
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
 
    .register-link {
      text-align: center;
      font-size: 13.5px;
      color: rgba(255,255,255,0.35);
    }
 
    .register-link a {
      color: #7F77DD;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
 
    .register-link a:hover { color: #a9a3f0; }
  </style>
</head>
<body>
 
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
 
  <div class="card">
 
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.61 1.41 4.89 3.5 6.17V17a1 1 0 001 1h5a1 1 0 001-1v-1.83C17.59 13.89 19 11.61 19 9c0-3.87-3.13-7-7-7zm2 14H10v-1h4v1zm1.33-3.17l-.83.57V14h-5v-2.6l-.83-.57C7.37 9.96 6.5 8.5 6.5 9c0-3.03 2.47-5.5 5.5-5.5s5.5 2.47 5.5 5.5c0-.5-.87.96-2.17 1.83z"/>
      </svg>
    </div>
 
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Acesse sua conta para continuar</p>
 
    <form action="auth.php" method="POST">
 
      <div class="field">
        <label for="inUser">Usuário</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </span>
          <input type="text" id="inUser" name="inUser" placeholder="Digite seu usuário" autocomplete="username">
        </div>
      </div>
 
      <div class="field">
        <label for="inPass">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </span>
          <input type="password" id="inPass" name="inPass" placeholder="Digite sua senha" autocomplete="current-password">
          <button type="button" class="toggle-pass" onclick="togglePass()" aria-label="Mostrar senha">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
      </div>
 
      <div class="forgot">
        <a href="#">Esqueceu a senha?</a>
      </div>
 
      <button type="submit">Entrar</button>
 
      <div class="divider">ou</div>
 
      <p class="register-link">Você ainda não tem uma conta ? crie uma agora<a href="#">Cadastre-se</a></p>
 
    </form>
  </div>
 
  <script>
    function togglePass() {
      const input = document.getElementById('inPass');
      const icon = document.getElementById('eye-icon');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.innerHTML = isHidden
        ? '<path d="M17.94 11.73A9.83 9.83 0 0012 9.5a9.83 9.83 0 00-5.94 2.23L3.27 8.95A13.26 13.26 0 0112 7c4.5 0 8.44 2.28 10.73 5.73L20.94 14.5l-3-2.77zm-5.94 6.77a6 6 0 01-3.76-1.32L5.5 20l-1.41-1.41 15-15L20.5 5l-2.82 2.82A9.86 9.86 0 0112 7c-2.94 0-5.6 1.07-7.65 2.83L2 12l2.35 2.17A9.89 9.89 0 0012 16.5a9.8 9.8 0 004.68-1.18l2.23 2.06A13.3 13.3 0 0112 18.5z"/>'
        : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  </script>
 
</body>
</html>
